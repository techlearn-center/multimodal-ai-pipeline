version: "3.9"
services:
  app:
    build: .
    ports:
      - "8000:8000"
      - "8888:8888"
    volumes:
      - .:/workspace
      - model-cache:/root/.cache
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - chromadb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
volumes:
  model-cache:
  chroma-data:
